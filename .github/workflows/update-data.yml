name: Actualizar datos del boletín

# Este workflow SOLO actualiza los datos (scraper + build_db + commit).
# No hace ningún "deploy": el sitio estático (index.html, search.js,
# boletin.sqlite.gz) se sirve con GitHub Pages configurado como "Deploy
# from a branch" → rama main, carpeta / (root). Pages redespliega solo en
# cada push a main, sin necesidad de ningún job ni artifact acá.

on:
  workflow_dispatch:
    inputs:
      fecha_inicio:
        description: 'Fecha inicial (YYYY-MM-DD)'
        required: false
        default: '2026-01-01'
      fecha_fin:
        description: 'Fecha final (YYYY-MM-DD, default: hoy)'
        required: false
        default: ''
  schedule:
    # Lunes a viernes a las 15:00 UTC (9am CDMX)
    - cron: '0 15 * * 1-5'

concurrency:
  group: actualizar-datos
  cancel-in-progress: false

jobs:
  scrape-and-commit:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - name: Install Python dependencies
        run: pip install requests beautifulsoup4

      - name: Set fecha_fin
        id: dates
        run: |
          INICIO="${{ github.event.inputs.fecha_inicio || '2026-01-01' }}"
          FIN="${{ github.event.inputs.fecha_fin }}"
          if [ -z "$FIN" ]; then
            FIN=$(date -u +%Y-%m-%d)
          fi
          echo "inicio=$INICIO" >> $GITHUB_OUTPUT
          echo "fin=$FIN" >> $GITHUB_OUTPUT
          echo "Rango: $INICIO → $FIN"

      - name: Restore PDF cache
        uses: actions/cache@v4
        with:
          path: scraper/data
          key: pdfs-${{ steps.dates.outputs.fin }}
          restore-keys: |
            pdfs-

      - name: Run scraper
        working-directory: scraper
        run: |
          python poc.py \
            ${{ steps.dates.outputs.inicio }} \
            ${{ steps.dates.outputs.fin }} \
            9999

      - name: Build SQLite DB
        working-directory: scraper
        run: |
          python build_db.py \
            --dir data/ \
            --output ../boletin.sqlite \
            --since ${{ steps.dates.outputs.inicio }}

      - name: Compress DB
        run: gzip -k -f boletin.sqlite

      - name: Commit DB to main
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          git config user.name "Bandatos Bot"
          git config user.email "bot@bandatos.org"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git
          git add -f boletin.sqlite.gz
          git commit -m "Actualizar DB — ${{ steps.dates.outputs.fin }}" || echo "Sin cambios"
          git push origin HEAD:main
